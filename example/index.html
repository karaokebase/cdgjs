<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>cdgjs Demo Page</title>
        <script type="module" src="main.js"></script>
        <style>
            body {
                font-size: 1em;
                font-family: sans-serif;
            }
            section {
                margin: 1em auto;
                width: 824px;
            }
            h1,
            p {
                text-align: center;
            }
            .cdg-border {
                background-color: #000;
                display: inline-block;
                position: relative;
            }
            .cdg-canvas {
                padding: 12px;
                width: 800px;
            }
            .cdg-loading {
                position: absolute;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                background-color: rgba(0, 0, 0, 0.6);
            }
            .cdg-loading::after {
                content: "";
                width: 48px;
                height: 48px;
                border: 5px solid rgba(255, 255, 255, 0.25);
                border-top-color: #fff;
                border-radius: 50%;
                animation: cdg-spin 0.8s linear infinite;
            }
            @keyframes cdg-spin {
                to { transform: rotate(360deg); }
            }
        </style>
    </head>
    <body>
        <section>
            <h1>
                Demo page for
                <a href="https://github.com/karaokebase/cdgjs">cdgjs</a>
            </h1>
            <div id="cdg"></div>
            <p>Double-click player for full-screen</p>
            <p>
                <button id="playbtn">Play</button>
                <button id="pausebtn">Pause</button>
                <button id="stopbtn">Stop</button>
            </p>
        </section>
    </body>
</html>
